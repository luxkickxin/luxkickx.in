<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Details</title>
  <style>
    body { font-family: Poppins,sans-serif; background: #111; color: #fff; text-align: center; padding: 20px; }
    img { max-width: 300px; border-radius: 10px; }
    .details { margin-top: 20px; }
    button { background: #ff3131; color: #fff; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; }
    button:hover { background: #ff4f4f; }
  </style>
</head>
<body>
  <h1 id="prodName"></h1>
  <img id="prodImg" src="" alt="">
  <div class="details">
    <h2 id="prodPrice"></h2>
    <button id="buyBtn">Buy Now on WhatsApp</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCYxb2C9DaT_j_SjFwmKEPV9NBKGiShJxM",
      authDomain: "luxkicx-7606f.firebaseapp.com",
      databaseURL: "https://luxkicx-7606f-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "luxkicx-7606f",
      storageBucket: "luxkicx-7606f.firebasestorage.app",
      messagingSenderId: "109211508096",
      appId: "1:109211508096:web:9c74e21f33dbf845fcb565"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const params = new URLSearchParams(window.location.search);
    const prodId = params.get("id");

    let whatsapp1 = "";

    onValue(ref(db, "whatsapp"), snapshot => {
      const data = snapshot.val();
      if(data) whatsapp1 = data.w1;
    });

    onValue(ref(db, "products/" + prodId), snapshot => {
      const p = snapshot.val();
      if(!p) return alert("Product not found!");
      document.getElementById("prodName").innerText = p.name;
      document.getElementById("prodImg").src = p.img;
      document.getElementById("prodPrice").innerText = "₹" + p.price;

      const msg = `Hi! I'm interested in ${p.name} (₹${p.price})`;
      document.getElementById("buyBtn").onclick = () => {
        window.open(`https://wa.me/${whatsapp1}?text=${encodeURIComponent(msg)}`, "_blank");
      };
    });
  </script>
</body>
</html>
